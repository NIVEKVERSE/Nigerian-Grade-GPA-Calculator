<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nigerian GPA Calculator | Calculate Your CGPA Free</title>
<meta name="description" content="Free Nigerian university GPA and CGPA calculator. Supports 5.0 and 4.0 grading scales."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#16a34a;--green-light:#dcfce7;--green-dark:#14532d;--green-mid:#22c55e;
  --gold:#ca8a04;--gold-light:#fef9c3;
  --blue:#1d4ed8;--blue-light:#dbeafe;
  --red:#dc2626;--red-light:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;--gray-900:#111827;
  --white:#ffffff;
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.10),0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.13);
}
body{font-family:'Inter',sans-serif;background:#f0fdf4;color:var(--gray-900);min-height:100vh;overflow-x:hidden;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,0.3);}50%{box-shadow:0 0 0 8px rgba(22,163,74,0);}}
@keyframes ripple{0%{transform:scale(0);opacity:1;}100%{transform:scale(4);opacity:0;}}
@keyframes notifPop{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

.animate-fadeUp{animation:fadeUp 0.5s ease both;}
.animate-fadeIn{animation:fadeIn 0.4s ease both;}
.delay-1{animation-delay:0.1s;}.delay-2{animation-delay:0.2s;}.delay-3{animation-delay:0.3s;}

/* HEADER */
header{
  background:linear-gradient(135deg,#15803d 0%,#16a34a 50%,#22c55e 100%);
  color:white;padding:1.5rem 1rem 1rem;position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,0.07);
}
header::after{
  content:'';position:absolute;bottom:-60px;left:-30px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,0.05);
}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
.header-left{}
.flag-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.flag{font-size:1.6rem;animation:bounce 2.5s ease-in-out infinite;}
.site-tag{font-size:0.65rem;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
header h1{font-size:1.35rem;font-weight:800;line-height:1.2;}
header p{font-size:0.8rem;opacity:0.8;margin-top:4px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.notif-btn{
  position:relative;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.3);
  color:white;border-radius:99px;padding:7px 12px;font-size:0.8rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all 0.2s;backdrop-filter:blur(4px);
  white-space:nowrap;
}
.notif-btn:hover{background:rgba(255,255,255,0.28);}
.notif-dot{
  position:absolute;top:-3px;right:-3px;width:10px;height:10px;
  background:#ef4444;border-radius:50%;border:2px solid white;
  animation:pulse 1.8s ease-in-out infinite;
}

/* NOTIFICATION PANEL */
.notif-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;
  display:none;align-items:flex-start;justify-content:flex-end;padding:70px 1rem 1rem;
  animation:fadeIn 0.2s ease;
}
.notif-overlay.open{display:flex;}
.notif-panel{
  background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);
  width:100%;max-width:340px;max-height:70vh;overflow-y:auto;
  animation:slideDown 0.25s ease;
}
.notif-header{
  padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--gray-100);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:white;z-index:1;
}
.notif-header h3{font-size:0.95rem;font-weight:700;}
.close-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--gray-400);padding:2px 6px;}
.post-preview{padding:1rem 1.25rem;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background 0.15s;}
.post-preview:last-child{border-bottom:none;}
.post-preview:hover{background:var(--gray-50);}
.post-cat{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--green);margin-bottom:4px;}
.post-preview h4{font-size:0.88rem;font-weight:600;color:var(--gray-900);margin-bottom:4px;line-height:1.4;}
.post-preview p{font-size:0.78rem;color:var(--gray-400);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-date{font-size:0.7rem;color:var(--gray-400);margin-top:6px;}
.read-more-btn{
  display:inline-block;margin-top:8px;font-size:0.75rem;font-weight:600;
  color:var(--green);background:var(--green-light);padding:4px 10px;
  border-radius:99px;border:none;cursor:pointer;
}
.no-posts{padding:2rem;text-align:center;color:var(--gray-400);font-size:0.85rem;}

/* FULL POST MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;
  display:none;align-items:center;justify-content:center;padding:1rem;
  animation:fadeIn 0.2s ease;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:white;border-radius:var(--radius);box-shadow:var(--shadow-lg);
  width:100%;max-width:540px;max-height:85vh;overflow-y:auto;
  animation:fadeUp 0.25s ease;
}
.modal-header{
  padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid var(--gray-100);
  display:flex;justify-content:space-between;align-items:flex-start;
  position:sticky;top:0;background:white;z-index:1;
}
.modal-header h2{font-size:1.1rem;font-weight:700;line-height:1.35;padding-right:1rem;}
.modal-body{padding:1.25rem;}
.post-content{font-size:0.9rem;line-height:1.75;color:var(--gray-800);}
.post-content strong{font-weight:700;}
.post-content em{font-style:italic;}
.post-content s{text-decoration:line-through;}
.post-content a{color:var(--green);text-decoration:underline;}
.post-content code{background:var(--gray-100);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:0.85em;}
.post-content blockquote{border-left:3px solid var(--green);padding-left:0.75rem;color:var(--gray-600);margin:0.5rem 0;}
.post-content ul,.post-content ol{padding-left:1.5rem;margin:0.5rem 0;}
.copy-inline{
  display:inline-flex;align-items:center;gap:4px;background:var(--gray-100);
  padding:2px 8px;border-radius:4px;font-family:monospace;font-size:0.82em;
  cursor:pointer;border:1px solid var(--gray-200);
}
.copy-inline:hover{background:var(--green-light);}

/* TABS */
.tabs-wrap{
  background:white;border-bottom:1px solid var(--gray-200);
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.tabs{display:flex;max-width:600px;margin:0 auto;}
.tab-btn{
  flex:1;padding:0.85rem 0.25rem;font-size:0.75rem;font-weight:700;
  border:none;background:transparent;color:var(--gray-400);
  cursor:pointer;border-bottom:3px solid transparent;
  transition:all 0.2s;letter-spacing:0.03em;text-transform:uppercase;
  position:relative;overflow:hidden;
}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-btn .tab-icon{display:block;font-size:1.1rem;margin-bottom:2px;}
.ripple-effect{
  position:absolute;border-radius:50%;background:rgba(22,163,74,0.2);
  width:10px;height:10px;transform:scale(0);animation:ripple 0.5s ease-out;
  pointer-events:none;
}

/* MAIN */
main{max-width:600px;margin:0 auto;padding:1.25rem 1rem 5rem;}
.page{display:none;}
.page.active{display:block;}

/* AD BANNER */
.ad-banner{
  border:1px dashed var(--gray-200);border-radius:var(--radius-sm);
  padding:0.75rem 1rem;margin-bottom:1.25rem;text-align:center;
  background:var(--white);position:relative;overflow:hidden;
}
.ad-tag{
  position:absolute;top:4px;left:6px;font-size:0.58rem;font-weight:700;
  color:var(--gray-400);text-transform:uppercase;letter-spacing:0.08em;
  background:var(--gray-100);padding:1px 5px;border-radius:3px;
}
.ad-banner-inner{min-height:70px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.ad-banner-inner img{max-width:100%;max-height:80px;border-radius:6px;object-fit:contain;}
.ad-banner-title{font-size:0.88rem;font-weight:700;color:var(--gray-800);}
.ad-banner-desc{font-size:0.75rem;color:var(--gray-600);}
.ad-banner-btn{
  display:inline-block;padding:5px 14px;border-radius:99px;font-size:0.78rem;font-weight:600;
  background:var(--green);color:white;text-decoration:none;margin-top:4px;cursor:pointer;border:none;
}
.ad-placeholder{color:var(--gray-400);font-size:0.78rem;}
/* Monetag slot */
.monetag-slot{min-height:60px;display:flex;align-items:center;justify-content:center;}

/* TAB AD OVERLAY */
.tab-ad-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  animation:fadeIn 0.2s ease;
}
.tab-ad-overlay.open{display:flex;}
.tab-ad-box{
  background:white;border-radius:var(--radius);padding:2rem 1.5rem;
  max-width:340px;width:90%;text-align:center;box-shadow:var(--shadow-lg);
  animation:fadeUp 0.3s ease;
}
.tab-ad-box .free-badge{font-size:2rem;margin-bottom:0.5rem;}
.tab-ad-box h3{font-size:1rem;font-weight:700;margin-bottom:0.4rem;}
.tab-ad-box p{font-size:0.8rem;color:var(--gray-600);margin-bottom:1rem;line-height:1.5;}
.tab-ad-content{min-height:100px;border:1px dashed var(--gray-200);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem;position:relative;}
.tab-ad-content .ad-tag{top:4px;left:4px;}
.tab-ad-content img{max-width:100%;max-height:100px;object-fit:contain;border-radius:6px;}
.skip-btn{
  padding:0.65rem 1.5rem;border-radius:99px;font-size:0.85rem;font-weight:700;
  background:var(--green);color:white;border:none;cursor:pointer;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.skip-btn:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}
.skip-timer{font-size:0.75rem;color:var(--gray-400);margin-top:6px;}

/* CARD */
.card{
  background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem;
  border:1px solid rgba(0,0,0,0.04);
  animation:fadeUp 0.4s ease both;
}
.card-title{font-size:0.95rem;font-weight:700;color:var(--gray-800);margin-bottom:0.2rem;}
.card-sub{font-size:0.8rem;color:var(--gray-400);margin-bottom:1rem;}

/* SCALE TOGGLE */
.scale-toggle{display:flex;gap:8px;margin-bottom:1.25rem;}
.scale-btn{
  flex:1;padding:0.6rem;font-size:0.85rem;font-weight:600;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:var(--white);color:var(--gray-600);cursor:pointer;transition:all 0.2s;
}
.scale-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);}

/* COURSE ITEM */
.course-item{
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:1rem;margin-bottom:0.75rem;background:var(--gray-50);
  position:relative;transition:box-shadow 0.2s;
  animation:fadeUp 0.3s ease both;
}
.course-item:hover{box-shadow:var(--shadow-md);}
.course-num{
  position:absolute;top:-11px;left:12px;
  background:var(--green);color:white;font-size:0.67rem;
  font-weight:700;padding:2px 9px;border-radius:99px;
}
.remove-course{
  position:absolute;top:8px;right:8px;
  background:none;border:none;color:var(--gray-300);
  cursor:pointer;font-size:1rem;line-height:1;padding:3px 5px;
  border-radius:4px;transition:all 0.15s;
}
.remove-course:hover{color:var(--red);background:var(--red-light);}
label.field-label{
  display:block;font-size:0.7rem;font-weight:700;
  color:var(--gray-600);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:0.05em;
}
input[type=text],input[type=number],select,input[type=email]{
  width:100%;padding:0.6rem 0.75rem;font-size:0.88rem;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:var(--white);color:var(--gray-900);
  font-family:'Inter',sans-serif;outline:none;transition:border 0.15s,box-shadow 0.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,0.1);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}

/* GRADE INDICATOR */
.grade-indicator{
  display:inline-block;font-size:0.7rem;font-weight:800;
  padding:2px 7px;border-radius:4px;margin-left:4px;
  background:var(--green-light);color:var(--green-dark);
}

/* BUTTONS */
.add-btn{
  width:100%;padding:0.75rem;font-size:0.88rem;font-weight:600;
  border:1.5px dashed var(--gray-200);border-radius:var(--radius-sm);
  background:transparent;color:var(--gray-600);cursor:pointer;
  margin-bottom:1rem;transition:all 0.2s;
}
.add-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light);}
.calc-btn{
  width:100%;padding:0.9rem;font-size:1rem;font-weight:800;
  border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;cursor:pointer;transition:all 0.2s;
  letter-spacing:0.01em;box-shadow:0 4px 14px rgba(22,163,74,0.3);
  position:relative;overflow:hidden;
}
.calc-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(22,163,74,0.4);}
.calc-btn:active{transform:scale(0.98);}
.reset-btn{
  width:100%;padding:0.65rem;font-size:0.85rem;font-weight:600;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:transparent;color:var(--gray-600);cursor:pointer;margin-top:0.5rem;
  transition:all 0.15s;
}
.reset-btn:hover{background:var(--gray-100);}

/* RESULT */
.result-card{
  background:var(--white);border-radius:var(--radius);
  border:2px solid var(--green);box-shadow:0 8px 32px rgba(22,163,74,0.15);
  padding:1.5rem;margin-top:1rem;display:none;text-align:center;
  animation:fadeUp 0.4s ease;
}
.result-card.show{display:block;}
.result-label{font-size:0.72rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.5rem;}
.result-gpa{
  font-size:4rem;font-weight:800;
  background:linear-gradient(135deg,#15803d,#22c55e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.result-scale{font-size:0.78rem;color:var(--gray-400);margin-top:2px;}
.result-class{margin-top:0.75rem;}
.badge{display:inline-block;font-size:0.82rem;font-weight:700;padding:6px 16px;border-radius:99px;}
.badge-first{background:var(--green-light);color:var(--green-dark);}
.badge-upper{background:var(--blue-light);color:var(--blue);}
.badge-lower{background:var(--gold-light);color:var(--gold);}
.badge-third{background:#ffedd5;color:#9a3412;}
.badge-pass{background:var(--gray-100);color:var(--gray-600);}
.badge-fail{background:var(--red-light);color:var(--red);}

.breakdown{margin-top:1.25rem;text-align:left;border-top:1px solid var(--gray-100);padding-top:1rem;}
.breakdown-title{font-size:0.7rem;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem;}
.breakdown-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:0.82rem;padding:6px 0;border-bottom:1px solid var(--gray-100);
}
.breakdown-row:last-child{border-bottom:none;}
.b-name{color:var(--gray-800);font-weight:600;}
.b-detail{color:var(--gray-400);font-size:0.75rem;}
.b-gp{font-weight:700;color:var(--green);}

/* SEMESTER rows */
.sem-item{
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:1rem;margin-bottom:0.75rem;background:var(--gray-50);
  position:relative;animation:fadeUp 0.3s ease both;
}
.sem-num{
  position:absolute;top:-11px;left:12px;
  background:#1d4ed8;color:white;font-size:0.67rem;
  font-weight:700;padding:2px 9px;border-radius:99px;
}

/* GRADE TABLE */
.grade-table{width:100%;border-collapse:collapse;font-size:0.83rem;}
.grade-table th{
  background:var(--green);color:white;padding:0.6rem 0.75rem;
  text-align:left;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;
}
.grade-table th:first-child{border-radius:8px 0 0 0;}
.grade-table th:last-child{border-radius:0 8px 0 0;}
.grade-table td{padding:0.55rem 0.75rem;border-bottom:1px solid var(--gray-100);}
.grade-table tr:last-child td{border-bottom:none;}
.grade-table tr:nth-child(even) td{background:var(--gray-50);}
.grade-letter{font-weight:800;color:var(--green);}
.class-table{width:100%;border-collapse:collapse;font-size:0.83rem;margin-top:1rem;}
.class-table th{background:var(--gray-800);color:white;padding:0.6rem 0.75rem;text-align:left;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;}
.class-table th:first-child{border-radius:8px 0 0 0;}
.class-table th:last-child{border-radius:0 8px 0 0;}
.class-table td{padding:0.55rem 0.75rem;border-bottom:1px solid var(--gray-100);}
.class-table tr:last-child td{border-bottom:none;}
.class-table tr:nth-child(even) td{background:var(--gray-50);}

/* INFO BOX */
.info-box{
  background:var(--green-light);border-left:4px solid var(--green);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:0.85rem 1rem;margin-bottom:1rem;
  font-size:0.82rem;color:var(--green-dark);line-height:1.55;
}

/* CONTACT PAGE */
.contact-card{
  background:white;border-radius:var(--radius);
  box-shadow:var(--shadow-md);padding:1.5rem;margin-bottom:1rem;
  border:1px solid var(--gray-100);text-align:center;
  animation:fadeUp 0.4s ease both;
}
.contact-avatar{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,#15803d,#22c55e);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:0 auto 0.75rem;
  box-shadow:0 4px 14px rgba(22,163,74,0.3);
  animation:glow 3s ease-in-out infinite;
}
.contact-name{font-size:1.05rem;font-weight:800;color:var(--gray-900);}
.contact-bio{font-size:0.8rem;color:var(--gray-400);margin-top:4px;line-height:1.5;}
.contact-links{display:flex;flex-direction:column;gap:10px;margin-top:1.25rem;}
.contact-link{
  display:flex;align-items:center;gap:10px;
  padding:0.8rem 1rem;border-radius:var(--radius-sm);
  font-size:0.88rem;font-weight:600;text-decoration:none;
  border:1.5px solid var(--gray-200);color:var(--gray-800);
  transition:all 0.2s;background:var(--gray-50);
}
.contact-link:hover{transform:translateX(4px);box-shadow:var(--shadow-md);}
.contact-link.email-link:hover{border-color:#ea4335;background:#fef2f2;color:#ea4335;}
.contact-link.wa-link:hover{border-color:#25d366;background:#f0fdf4;color:#15803d;}
.contact-icon{font-size:1.2rem;}
.contact-link-detail{font-size:0.72rem;color:var(--gray-400);font-weight:400;}

/* TIP */
.tip{font-size:0.76rem;color:var(--gray-400);text-align:center;margin-top:0.5rem;}

/* FOOTER */
footer{
  background:var(--gray-900);color:var(--gray-400);
  text-align:center;padding:2rem 1rem 1.5rem;margin-top:2rem;
}
footer .footer-logo{font-size:1rem;font-weight:800;color:white;margin-bottom:0.4rem;}
footer p{font-size:0.75rem;line-height:1.6;}
.footer-ad{
  border:1px dashed #374151;border-radius:var(--radius-sm);
  padding:0.75rem;margin:1rem 0;position:relative;
}
.footer-ad .ad-tag{top:4px;left:6px;background:#374151;color:#9ca3af;}
